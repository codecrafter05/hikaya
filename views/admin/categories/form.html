{% extends "base.html" %}

{% block title %}Hikaya — {{ page_title }}{% endblock %}

{% block content %}
<div class="page-breadcrumb d-none d-sm-flex align-items-center mb-3">
  <div class="breadcrumb-title pe-3">Menu</div>
  <div class="ps-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0 p-0">
        <li class="breadcrumb-item"><a href="/admin/dashboard"><i class="material-icons-outlined">home</i></a></li>
        <li class="breadcrumb-item"><a href="/admin/categories">Categories</a></li>
        <li class="breadcrumb-item active" aria-current="page">{{ page_title }}</li>
      </ol>
    </nav>
  </div>
</div>

<div class="card rounded-4">
  <div class="card-body">
    <h5 class="fw-bold mb-3">{{ page_title }}</h5>
    <form method="post" action="{{ form_action }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name (Arabic)</label>
          <input type="text" name="name_ar" class="form-control" required
                 value="{{ category.name_ar if category else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Name (English)</label>
          <input type="text" name="name_en" class="form-control" required
                 value="{{ category.name_en if category else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Display Order</label>
          <input type="number" name="display_order" class="form-control"
                 value="{{ category.display_order if category else 0 }}">
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_active" value="1" id="isActive"
                   {% if category is none or category.is_active %}checked{% endif %}>
            <label class="form-check-label" for="isActive">Active</label>
          </div>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-grd-primary">Save</button>
        <a href="/admin/categories" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
